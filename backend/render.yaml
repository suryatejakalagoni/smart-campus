services:
  - type: web
    name: smartcampus-api
    runtime: python
    buildCommand: ./build.sh
    startCommand: gunicorn smartcampus.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: smartcampus-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        value: https://smartcampus-frontend.vercel.app
databases:
  - name: smartcampus-db
    plan: free
