databases:
  - name: smartcampus-db
    plan: free
    databaseName: smartcampus
    user: smartcampus

services:
  - type: web
    name: smartcampus-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: ./build.sh
    startCommand: gunicorn smartcampus.wsgi:application --log-file -
    healthCheckPath: /api/
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: smartcampus-db
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        sync: false  # Set this to your Vercel URL after frontend deploy
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
